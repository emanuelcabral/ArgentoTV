<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ArgentoTV</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body>

  <header>
    <h1>📺 ArgentoTV</h1>
    <input type="text" id="search" placeholder="Buscar canal...">
  </header>

  <main>

    <!-- LISTA DE CANALES -->
    <div id="channel-list"></div>

    <!-- PLAYER -->
    <div id="player-container">

      <!-- 🔥 VIDEO SIN CONTROLES NATIVOS -->
      <video id="video" autoplay></video>

      <!-- 🔥 OVERLAY (INFO CANAL + CONTROLES) -->
      <div id="overlay">
        <div class="overlay-content">
          <img id="overlay-logo">
          <div class="overlay-text">
            <div id="overlay-name"></div>
            <div id="overlay-epg"></div>
          </div>

          <!-- 🔥 CONTROLES PERSONALIZADOS DENTRO DEL OVERLAY -->
          <div id="custom-controls">
            <button id="play-pause-btn">⏯</button>

            <input 
              id="volume-slider" 
              type="range" 
              min="0" 
              max="1" 
              step="0.05" 
              value="1"
            >

            <button id="fullscreen-btn">⛶</button>
          </div>
        </div>
      </div>

    </div>

  </main>

  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script src="player.min.js"></script>

  <script src="app.js"></script>

</body>
</html>
