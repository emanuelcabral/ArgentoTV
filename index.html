<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ArgentoTV</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body>

  <header>
    <h1>📺 ArgentoTV</h1>
    <input type="text" id="search" placeholder="Buscar canal...">
  </header>

  <main>

    <!-- LISTA DE CANALES -->
    <div id="channel-list"></div>

    <!-- PLAYER -->
    <div id="player-container">
      <div id="hora"></div>
      <!-- 🔥 VIDEO SIN CONTROLES NATIVOS -->
      <video id="video" autoplay></video>

      <!-- 🔥 OVERLAY (INFO CANAL + CONTROLES) -->
      <div id="overlay">
        <div class="overlay-content">
          <img id="overlay-logo">

          <div class="overlay-text">
            <!-- Nombre del canal -->
            <div id="overlay-name"></div>

            <!-- Bloque EPG (mantengo el ID original y agrego más dentro) -->
            <div id="overlay-epg">
              <div id="overlay-title"></div>

              <div id="overlay-time">
                <span id="overlay-start"></span> - <span id="overlay-stop"></span>
                <div id="overlay-progress">
                  <div id="overlay-progress-bar"></div>
                </div>
              </div>

              <div id="overlay-category"></div>
              <div id="overlay-desc"></div>

              <div id="overlay-tech">
                <span id="overlay-resolution"></span> |
                <span id="overlay-bitrate"></span> |
                <span id="overlay-audio"></span>
              </div>
            </div>
          </div>

          <!-- 🔥 CONTROLES PERSONALIZADOS DENTRO DEL OVERLAY -->
          <div id="custom-controls">
            <!-- <button id="play-pause-btn">⏯</button> -->

            <!-- <input 
              id="volume-slider" 
              type="range" 
              min="0" 
              max="1" 
              step="0.05" 
              value="1"
            > -->

            <button id="fullscreen-btn">⛶</button>
          </div>
        </div>
      </div>

    </div>

  </main>

  

  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script src="player.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
